<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>報名資料確認中</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #f5f5f5; padding: 20px; box-sizing: border-box; }
        .container { background: white; padding: 40px 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; max-width: 400px; width: 100%; }
        h1 { color: #06c755; margin: 0 0 15px 0; font-size: 24px; }
        p { color: #555; line-height: 1.6; margin: 0 0 20px 0; font-size: 15px; }
        .btn { display: inline-block; width: 100%; padding: 15px 0; border-radius: 10px; text-decoration: none; border: none; font-size: 16px; cursor: pointer; font-weight: bold; transition: background 0.3s; margin-bottom: 10px; box-sizing: border-box; text-align: center; }
        .btn-primary { background-color: #06c755; color: white; box-shadow: 0 4px 6px rgba(6, 199, 85, 0.2); }
        .btn-primary:hover { background-color: #05a546; }
        .btn-secondary { background-color: #f0f0f0; color: #555; border: 1px solid #ddd; }
        .btn-secondary:hover { background-color: #e0e0e0; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #06c755; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
        .note { font-size: 12px; color: #999; margin-top: 5px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <!-- 載入中 -->
    <div id="loading" class="container">
        <div class="loader"></div>
        <p style="font-size: 18px; font-weight: bold; margin-top: 15px;">正在為您確認報名資料...</p>
        <p style="color: #ff4b4b; font-weight: bold; margin-top: 10px; line-height: 1.5;">
            💡 溫馨提醒：請勿關閉本網頁！
        </p>
    </div>

    <!-- 成功畫面（LIFF 登入成功） -->
    <div id="success" class="container hidden">
        <h1>🎉 報名成功！</h1>
        <p>親愛的 <b id="user-name"></b>，<br>資料已確認，歡迎準時加入直播！</p>
        <p style="font-size: 13px; color: #06c755; font-weight: bold; margin-top: 0; margin-bottom: 20px;">
            ✅ 預約成功訊息將透過 LINE 發送給您！
        </p>
        <!-- 按鈕 A：加入官方 LINE -->
        <a href="https://lin.ee/ZMowQJg" class="btn btn-primary">
            💬 加入官方 LINE 領取提醒
        </a>
        <p style="font-size: 13px; color: #999; margin-top: 10px;">
            點擊上方按鈕加入後，即可收到專屬直播連結！
        </p>
    </div>

    <!-- 失敗畫面（LIFF 登入失敗或跳轉問題） -->
    <div id="failed" class="container hidden">
        <h1>🎉 報名成功！</h1>
        <p>親愛的 <b id="user-name-failed"></b>，<br>您的專屬直播連結已準備好！</p>
        <p style="font-size: 13px; color: #ff4b4b; font-weight: bold; margin-top: 0; margin-bottom: 15px;">
            請先點擊下方按鈕進入直播間，<br>直播中也可以掃碼加入我們的 LINE！
        </p>
        <!-- 按鈕 C：直播連結（綠色） -->
        <a id="webinar-btn-failed" href="#" class="btn btn-primary">
            👉 點擊進入講座直播間
        </a>
        <p class="note">（時間到了才能進入唷！）</p>
        <!-- 按鈕 D：官方 LINE 純連結（白色） -->
        <a href="https://lin.ee/ZMowQJg" class="btn btn-secondary">
            💬 加入官方 LINE 掌握最新消息
        </a>
    </div>

    <script>
        // ── 設定區 ──
        const MyLiffId = '2009771736-hbNEloBb';
        const MakeWebhookUrl = 'https://hook.us2.make.com/my7wlg6ystnykr63gn7nimqgoizhetbo';
        const WebinarBaseUrl = 'https://webinar.archiestudio.co/webinar/thankyou/696f0867a8416e192c4c1c7e/';

        // ── 從各種來源解析報名參數 ──
        function getParams() {
            const urlParams = new URLSearchParams(window.location.search);

            // 方法1：直接從 URL 取（最理想）
            let t = urlParams.get('t') || '';
            let r = urlParams.get('r') || '';
            let firstName = urlParams.get('first_name') || '';
            let email = urlParams.get('email') || '';
            let phone = urlParams.get('phone_number') || '';

            // 方法2：從 liff.state 解析（LIFF 登入後常見）
            if (!r && !t) {
                try {
                    const liffState = urlParams.get('liff.state') || '';
                    if (liffState) {
                        // 可能是多重編碼，嘗試解碼直到取得乾淨的參數
                        let decoded = liffState;
                        for (let i = 0; i < 3; i++) {
                            try { decoded = decodeURIComponent(decoded); } catch(e) { break; }
                            if (decoded.includes('r=') || decoded.includes('t=')) break;
                        }
                        const stateParams = new URLSearchParams(
                            decoded.startsWith('?') ? decoded.slice(1) : decoded
                        );
                        t = stateParams.get('t') || '';
                        r = stateParams.get('r') || '';
                        firstName = stateParams.get('first_name') || '';
                        email = stateParams.get('email') || '';
                        phone = stateParams.get('phone_number') || '';
                    }
                } catch(e) {}
            }

            // 方法3：從 sessionStorage 取（登入前存的備份）
            if (!r && !t) {
                try {
                    const stored = sessionStorage.getItem('webinar_params');
                    if (stored) {
                        const p = JSON.parse(stored);
                        t = p.t || '';
                        r = p.r || '';
                        firstName = p.first_name || '';
                        email = p.email || '';
                        phone = p.phone_number || '';
                    }
                } catch(e) {}
            }

            return { t, r, firstName, email, phone };
        }

        // ── 組裝直播連結 ──
        function buildWebinarUrl(params) {
            const p = new URLSearchParams();
            if (params.t) p.set('t', params.t);
            if (params.r) p.set('r', params.r);
            if (params.firstName) p.set('first_name', params.firstName);
            if (params.email) p.set('email', params.email);
            if (params.phone) p.set('phone_number', params.phone);
            return WebinarBaseUrl + '?' + p.toString();
        }

        function showSuccess(name) {
            document.getElementById('user-name').textContent = name;
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('success').classList.remove('hidden');
        }

        function showFailed(name, webinarUrl) {
            document.getElementById('user-name-failed').textContent = name;
            document.getElementById('webinar-btn-failed').href = webinarUrl;
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('failed').classList.remove('hidden');
        }

        async function main() {
            try {
                // 登入前先把 URL 上的報名參數存進 sessionStorage（備份）
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.has('r') || urlParams.has('t')) {
                    sessionStorage.setItem('webinar_params', JSON.stringify({
                        t: urlParams.get('t') || '',
                        r: urlParams.get('r') || '',
                        first_name: urlParams.get('first_name') || '',
                        email: urlParams.get('email') || '',
                        phone_number: urlParams.get('phone_number') || ''
                    }));
                }

                // 無限跳轉防護
                const redirectCount = parseInt(sessionStorage.getItem('redirect_count') || '0');
                if (redirectCount > 3) {
                    sessionStorage.removeItem('redirect_count');
                    const params = getParams();
                    showFailed(params.firstName || '同學', buildWebinarUrl(params));
                    return;
                }

                await liff.init({ liffId: MyLiffId });

                // liff.init() 完成後，再取參數（此時 liff.state 已被處理）
                const params = getParams();
                const webinarUrl = buildWebinarUrl(params);
                const displayName = params.firstName || '同學';

                if (!liff.isLoggedIn()) {
                    sessionStorage.setItem('redirect_count', String(redirectCount + 1));

                    // 組裝乾淨的 redirectUri
                    const cleanParams = new URLSearchParams();
                    if (params.t) cleanParams.set('t', params.t);
                    if (params.r) cleanParams.set('r', params.r);
                    if (params.firstName) cleanParams.set('first_name', params.firstName);
                    if (params.email) cleanParams.set('email', params.email);
                    if (params.phone) cleanParams.set('phone_number', params.phone);

                    const cleanUrl = window.location.origin + window.location.pathname + '?' + cleanParams.toString();
                    liff.login({ redirectUri: cleanUrl });
                    return;
                }

                // LIFF 登入成功
                sessionStorage.removeItem('redirect_count');
                const profile = await liff.getProfile();
                const name = params.firstName || profile.displayName;

                // 觸發 Make Step 2 Webhook
                const storageKey = `webhook_sent_${params.r || profile.userId}`;
                if (!localStorage.getItem(storageKey)) {
                    fetch(MakeWebhookUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            line_id: profile.userId,
                            display_name: profile.displayName,
                            email: params.email,
                            first_name: params.firstName,
                            r: params.r
                        })
                    });
                    localStorage.setItem(storageKey, '1');
                }

                showSuccess(name);

            } catch (err) {
                console.error(err);
                const params = getParams();
                showFailed(params.firstName || '同學', buildWebinarUrl(params));
            }
        }

        main();
    </script>
</body>
</html>
